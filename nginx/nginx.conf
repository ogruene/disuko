events {
}
http {
  server {
    listen 3009 ssl;
    http2 on;
    server_name localhost;


    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    client_max_body_size 50M;

    listen 80;
    location / {
       proxy_pass http://client:8080;
    }
    location /api {
       proxy_pass http://server:3009;
    }
    location /login {
       proxy_pass http://server:3009;
    }
  }
}
