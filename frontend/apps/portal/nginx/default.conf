server {
    listen       8080;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index index.html
        try_files $uri $uri/ /index.html;
    }
    
    location /config.json {
        root /usr/share/nginx/html/;
        index config.json;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504  /50x.html;
}
